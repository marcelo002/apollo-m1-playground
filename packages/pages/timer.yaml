lvgl_page_manager:
  pages:
    - page: page_timer
      friendly_name: "Timer"

# Fetch timer state from Home Assistant
text_sensor:
  - platform: homeassistant
    id: ha_timer_remaining
    entity_id: ${TIMER_ENTITY}
    attribute: remaining
    on_value:
      then:
        - lambda: |-
            auto timer = id(ha_timer_remaining);
            if (timer->state == "active" || timer->state == "paused") {
              int remaining = timer->attributes["remaining"].as<int>();
              int hours = remaining / 3600;
              int minutes = (remaining % 3600) / 60;
              int seconds = remaining % 60;
              return str_sprintf("%02d:%02d:%02d", hours, minutes, seconds);
            } else {
              return std::string("00:00:00");
            }

# ---- Simple Timer ----
lvgl:
  pages:
    - id: page_timer
      width: 100%
      height: 100%
      layout:
        type: FLEX
        flex_flow: COLUMN
        flex_align_main: CENTER
        flex_align_cross: CENTER
        pad_row: 6
      widgets:
        - label:
            id: timer_label
            width: 100%
            text_align: CENTER
            # render time via built-in time_format
            text: "Timer: 00:00"


# ---- Extend your existing time source ----
time:
  - id: !extend ha_time

    # when we first get a valid clock, populate both labels
    on_time_sync:
      then:
        - lvgl.label.update:
              id: timer_label
              text: "Timer: 00:00"


    # update both every minute on the minute
    on_time:
      - seconds: 0
        minutes: /1
        then:
          - lvgl.label.update:
              id: timer_label
              text: "Timer: 00:00"
